services:
  # Unified MERN App (Backend serving Frontend)
  - type: web
    name: career-guidance-system
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://career-guidance-system.onrender.com # Update this if you change the name

