services:
  # Unified MERN App (Backend serving Frontend)
  - type: web
    name: career-guidance-system
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "node backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://career-guidance-system-l855.onrender.com
